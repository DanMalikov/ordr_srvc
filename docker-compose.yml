services:
  postgres:
    image: postgres:16
    container_name: order-postgres
    restart: unless-stopped
    env_file:
      - .env_prod
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  order_service:
    build:
      context: .
    image: app_order_service:latest
    container_name: order_service_app
    env_file:
      - .env_prod
    depends_on:
      - postgres

    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: